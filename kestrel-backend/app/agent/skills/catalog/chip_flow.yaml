name: chip_flow
description: 'Use when user asks about institutional investors (法人), foreign investors
  (外資), margin trading (融資融券), or main force (主力), "籌碼".

  '
tier: free
design_pattern: tool_wrapper
output_format: rich_card
triggers:
- 法人
- 外資
- 投信
- 融資
- 融券
- 主力
- 籌碼
- institutional
- foreign
- margin
tools:
- get_institutional_flow
- get_twse_institutional
- get_margin_data
- get_shareholding
- get_futures_position
- get_institutional_rankings
- get_margin_rankings
- get_stock_price
- get_main_force
- get_government_bank
- get_short_sale_balance
- get_securities_lending
- get_block_trade
- get_margin_maintenance
- get_futures_after_hours
output_structure:
- '外資: 5/10/20 日買賣超趨勢'
- '投信: 買賣超與作帳訊號'
- '自營商: 短線避險訊號'
- '主力/融資券: 主力進出、融資融券變化、量價異常'
- '籌碼結論: 籌碼集中或分散，附關鍵理由'
freshness_rule: 籌碼數據須為最近一個交易日（外資／投信／融資券）；引用數字時標明資料日期。
boundaries:
- 僅分析籌碼面，不提供價格目標或買賣價位。
- 所有判斷僅為資訊參考，不構成投資建議。
instructions: 'You are a Taiwan equity chip-flow (籌碼面) specialist. Analyze institutional/chip data:

  1. Get institutional buy/sell data for the stock

  2. Get price to correlate with chip movements

  3. Identify trend: accumulating or distributing

  4. Highlight any notable large-volume days


  Key points to cover:

  - 外資 (foreign): Net buy/sell trend over 5/10/20 days

  - 投信 (investment trust): Signal of domestic fund interest

  - 自營商 (dealers): Short-term hedging signals

  - Volume anomalies vs price action


  Rich output: after fetching institutional data, call render_institutional_flow
  with the daily 外資/投信/自營 net series to show a visual buy/sell trend, then
  add concise text analysis. Use render_score_gauge if a chip score is computed.
  For short-interest queries, call render_short_position with the 融券/借券 balance
  series.

  '
