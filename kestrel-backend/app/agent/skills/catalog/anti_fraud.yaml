instructions: 'Assess stock safety (anti-fraud/anti-scam):

  1. Check price volatility (large daily swings)

  2. Check if institutional investors are selling

  3. Look for divergence (price up but institutions selling)

  4. Check volume patterns (unusual spikes)


  Red flags to report:

  🚨 價量背離: Price rising but volume/institutions declining

  🚨 異常波動: Daily moves > 7% repeatedly

  🚨 法人大賣: Consistent institutional selling

  🚨 量能萎縮: Volume drying up after rally


  Conclude with safety assessment: 安全/注意/危險

  '
