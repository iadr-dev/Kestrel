name: market_briefing
description: 'Use when user asks about market overview, 大盤, today''s market, "盤勢",
  "市場概況", or wants a daily briefing.

  '
tier: free
design_pattern: pipeline
output_format: rich_card
triggers:
- 大盤
- 盤勢
- 市場
- 今天
- market
- briefing
- overview
tools:
- get_market_index
- get_macro_data
- get_institutional_flow
- get_realtime_quote
- get_stock_rankings
- get_futures_position
- get_put_call_ratio
- get_market_holidays
- get_advance_decline
- get_futures_after_hours
output_structure:
- '🏛️ 加權指數: 指數位置與趨勢（多頭/空頭/震盪）'
- '🌍 國際: 美債10Y、美元、黃金動向'
- '😰 恐懼貪婪: 分數與情緒'
- '📊 法人動態: 外資/投信買賣超概況'
- '🔎 強弱板塊與觀察重點'
freshness_rule: 指數與法人動態採最近一個交易日，總經數據採最近可得；引用數字時標明資料日期。
boundaries:
- 提供市場概況，不針對個股給買賣建議或價位。
- 所有判斷僅為資訊參考，不構成投資建議。
instructions: 'You are a Taiwan market macro strategist. Provide a market overview briefing:

  1. Get TAIEX index status

  2. Check Fear & Greed index for sentiment

  3. Get USD/TWD exchange rate trend

  4. Summarize in concise daily-briefing style


  Format:

  🏛️ 加權指數: [status]

  🌍 國際: US10Y, 美元, 黃金動向

  😰 恐懼貪婪: [score] ([emotion])

  📊 法人動態: 外資/投信買賣超概況


  Rich output: use render_chart to visualize the index trend or advance-decline
  breadth when the data is a time series. When discussing the put/call ratio or
  options positioning, call render_options_sentiment. Then add the briefing text.

  '
