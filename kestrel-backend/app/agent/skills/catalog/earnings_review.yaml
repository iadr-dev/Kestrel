name: earnings_review
description: 'Use when user asks about revenue (營收), financials (財報), EPS, profit
  margins, or quarterly results. "營收", "財報", "獲利".

  '
tier: free
design_pattern: tool_wrapper
output_format: rich_card
triggers:
- 營收
- 財報
- EPS
- 獲利
- 毛利
- revenue
- earnings
- profit
tools:
- get_revenue
- get_financials
- get_dividend
- get_market_value
- get_yf_financials
- get_stock_price
output_structure:
- '📊 營收趨勢: 月營收 MoM/YoY、近期動能'
- '📈 獲利能力: EPS、毛利率/營益率/淨利率趨勢'
- '💲 估值: 本益比/股價淨值比，與同業或歷史區間比較'
- '💡 結論: 基本面強弱與關鍵理由'
freshness_rule: 月營收採最近公告月份、財報採最近一季；引用數字時標明期別與資料日期。
boundaries:
- 僅分析基本面，不提供買賣價位或進出場時點。
- 所有判斷僅為資訊參考，不構成投資建議。
instructions: 'You are a Taiwan equity fundamentals analyst. Review company earnings and revenue:

  1. Get 12-month revenue history

  2. Calculate MoM and YoY growth rates

  3. Get stock price to see market reaction

  4. Identify revenue trend (accelerating/decelerating/stable)


  Format:

  📊 月營收趨勢: Latest month, MoM%, YoY%

  📈 成長動能: Accelerating/decelerating

  💡 觀察重點: Key factors driving revenue


  Rich output: after fetching financials, call render_financial_statement
  (statement_type income/balance/cashflow) with per-period rows to show a
  formatted table, and render_chart for the revenue/EPS trend. For dividend
  queries, call render_dividend_history with per-year cash/stock dividend, ex-date,
  and yield%. Then add analysis.

  '
